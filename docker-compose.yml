services:
  nginx:
    image: nginx:stable-alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_started
      wordpress-nginx:
        condition: service_started
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  frontend:
    image: ${FRONTEND_IMAGE:?set FRONTEND_IMAGE in .env}
    container_name: frontend
    expose:
      - "4000"
    environment:
      PORT: 4000
      NODE_OPTIONS: --max-old-space-size=512
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/home').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  backend:
    image: ${BACKEND_IMAGE:?set BACKEND_IMAGE in .env}
    container_name: backend
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      PORT: 3000
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/home').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  wordpress:
    image: wordpress:php8.2-fpm
    container_name: wordpress
    depends_on:
      mariadb:
        condition: service_healthy
    expose:
      - "9000"
    environment:
      WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
      WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
      WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
      WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
      WORDPRESS_HOME: ${WORDPRESS_PUBLIC_URL:-http://localhost/blog}
      WORDPRESS_SITEURL: ${WORDPRESS_PUBLIC_URL:-http://localhost/blog}
    volumes:
      - wordpress_data:/var/www/html
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M

  wordpress-nginx:
    image: nginx:stable-alpine
    container_name: wordpress-nginx
    depends_on:
      - wordpress
    expose:
      - "8080"
    volumes:
      - wordpress_data:/var/www/html
      - ./wordpress/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M

  mariadb:
    image: mariadb:11
    container_name: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command:
      - --innodb-buffer-pool-size=256M
      - --performance-schema=OFF
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./mariadb/my.cnf:/etc/mysql/conf.d/99-citypenha.cnf:ro
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  internal:
    driver: bridge

volumes:
  mariadb_data:
  wordpress_data:

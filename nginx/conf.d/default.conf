# Bootstrap — HTTP funcional antes do certificado (substituir redirect acima):
server {
    listen 80;
    server_name citypenha.com.br localhost;
    
    client_max_body_size 50M;
    
    include /etc/nginx/conf.d/locations.inc;
 }

# Após certbot: redireciona todo tráfego HTTP para HTTPS.
# Bootstrap (sem certificado TLS): comente o bloco abaixo e descomente o bloco de bootstrap.

server {
    listen 80;
    server_name citypenhadigital.com.br www.citypenhadigital.com.br;

    return 301 https://$host$request_uri;
}


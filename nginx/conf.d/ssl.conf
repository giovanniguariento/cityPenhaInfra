# TLS via Certbot no host (Opção A):
#
#   sudo certbot certonly --standalone -d citypenha.com.br
#   docker compose up -d nginx
#
# Renovação: certbot renew && docker compose exec nginx nginx -s reload
#
# Ajuste server_name e caminhos ssl_* para PUBLIC_DOMAIN.

server {
    listen 443 ssl http2;
    server_name citypenha.com.br;

    ssl_certificate     /etc/letsencrypt/live/citypenha.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/citypenha.com.br/privkey.pem;

    client_max_body_size 50M;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    include /etc/nginx/conf.d/locations.inc;
}

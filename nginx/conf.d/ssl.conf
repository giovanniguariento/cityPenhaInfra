# TLS via Certbot no host (Opção A):
#
#   sudo certbot certonly --standalone \
#     -d citypenhadigital.com.br -d www.citypenhadigital.com.br
#   docker compose up -d nginx
#
# Renovação: certbot renew && docker compose exec nginx nginx -s reload

server {
    listen 443 ssl;
    http2 on;
    server_name citypenhadigital.com.br www.citypenhadigital.com.br;

    ssl_certificate     /etc/letsencrypt/live/citypenhadigital.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/citypenhadigital.com.br/privkey.pem;

    client_max_body_size 50M;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    include /etc/nginx/conf.d/locations.inc;
}

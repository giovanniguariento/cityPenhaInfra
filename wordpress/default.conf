server {
    listen 8080;

    root /var/www/html;
    index index.php index.html index.htm;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass wordpress:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        # Internal Docker traffic (backend -> wordpress-nginx) has no edge proxy headers.
        # Treat PHP requests as HTTPS so WP 6.8+ enables Application Passwords (is_ssl()).
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_param HTTP_X_FORWARDED_PREFIX $http_x_forwarded_prefix;
    }
}
